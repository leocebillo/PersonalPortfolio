<main>

  <section class="section">
    <div class="section-head">
      <p class="eyebrow mono">01 / photography</p>
      <h2>Personal Favorites.</h2>
      <p class="section-sub">Some of my favorite shots where I'm from!</p>
    </div>
    <div class="contact-sheet" id="photoGrid">
      <figure class="frame">
        <div class="frame-img"><img src="assets/photos/pic1.JPG" alt="A pink rose in bloom" loading="lazy"></div>
        <figcaption class="mono">Beautiful Flower</figcaption>
      </figure>
      <figure class="frame">
        <div class="frame-img"><img src="assets/photos/pic2.JPG" alt="Front of a blue Dodge Charger SRT" loading="lazy"></div>
        <figcaption class="mono">Front · Blue Dodge Charger SRT</figcaption>
      </figure>
      <figure class="frame">
        <div class="frame-img"><img src="assets/photos/pic3.JPG" alt="Rear of a blue Dodge Charger SRT at dusk" loading="lazy"></div>
        <figcaption class="mono">Back · Blue Dodge Charger SRT</figcaption>
      </figure>
      <figure class="frame">
        <div class="frame-img"><img src="assets/photos/pic4.jpg" alt="A curious squirrel on campus grass" loading="lazy"></div>
        <figcaption class="mono">Curious Campus Squirrel</figcaption>
      </figure>
      <figure class="frame">
        <div class="frame-img"><img src="assets/photos/pic5.JPG" alt="A yellow-bellied bird perched in a tree" loading="lazy"></div>
        <figcaption class="mono">Bird in Nature</figcaption>
      </figure>
      <figure class="frame">
        <div class="frame-img"><img src="assets/photos/pic6.JPG" alt="American flag and Texan flag flying together" loading="lazy"></div>
        <figcaption class="mono">American Flag · Texan Flag</figcaption>
      </figure>
    </div>
  </section>
