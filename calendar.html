<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Leo</title>
<meta name="description" content="Upcoming shoots, gigs, and releases.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="brand">Leo<span class="brand-dot">.</span></a>
  <nav class="nav" aria-label="Primary">
    <a href="photography.html"><span class="nav-idx">01</span>Photography</a>
    <a href="music.html"><span class="nav-idx">02</span>Music</a>
    <a href="coding.html"><span class="nav-idx">03</span>Code</a>
    <a href="calendar.html" class="active"><span class="nav-idx">04</span>Calendar</a>
    <a href="about.html"><span class="nav-idx">05</span>About</a>
    <a href="index.html#contact"><span class="nav-idx">06</span>Contact</a>
  </nav>
  <button class="nav-toggle" id="navToggle" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<main>

  <section class="section">
    <div class="section-head">
      <p class="eyebrow mono">04 / calendar</p>
      <h2>What's coming up.</h2>
      <p class="section-sub">Shoots, gigs, and releases — tap a marked date for details.</p>
    </div>
    <div class="cal-widget">
      <div class="cal-head">
        <button class="cal-nav" id="calPrev" aria-label="Previous month">‹</button>
        <h3 class="cal-month mono" id="calMonthLabel">Month Year</h3>
        <button class="cal-nav" id="calNext" aria-label="Next month">›</button>
      </div>
      <div class="cal-weekdays mono" aria-hidden="true">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-upcoming">
        <p class="eyebrow mono" style="margin-bottom:10px">Upcoming</p>
        <ul class="cal-upcoming-list mono" id="calUpcomingList"></ul>
      </div>
    </div>
  </section>

</main>

<footer class="footer mono">
  <span>© <span id="year"></span> Leo</span>
  <span>Built on a Raspberry Pi 4.</span>
</footer>

<script src="script.js"></script>
</body>
</html>
